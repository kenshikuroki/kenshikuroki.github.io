name: Update Sitemap

on:
  push:
    branches: [ main ]
    paths:
      - 'index.html'
      - 'assets/data/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-sitemap:
    runs-on: ubuntu-latest
    concurrency:
      group: update-sitemap-${{ github.ref }}
      cancel-in-progress: true

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Generate sitemap
      run: |
        cd $GITHUB_WORKSPACE
        python scripts/generate_sitemap.py | tee sitemap_update_log.txt

    - name: Check for changes
      id: verify-changed-files
      run: |
        if git diff --quiet -- sitemap.xml; then
          echo "changed=false" >> $GITHUB_OUTPUT
        elif [ -n "$(git status --porcelain -- sitemap.xml)" ]; then
          echo "changed=true" >> $GITHUB_OUTPUT
        else
          echo "changed=false" >> $GITHUB_OUTPUT
        fi

    - name: Summary
      if: always()
      run: |
        echo "## Sitemap Update Summary" >> $GITHUB_STEP_SUMMARY
        if [ -f "sitemap_update_log.txt" ]; then
          LASTMOD=$(grep "^SITEMAP_LASTMOD=" sitemap_update_log.txt | tail -1 | cut -d= -f2-)
          SOURCE=$(grep "^SITEMAP_LASTMOD_SOURCE=" sitemap_update_log.txt | tail -1 | cut -d= -f2-)
          echo "- **Lastmod**: ${LASTMOD:-unknown}" >> $GITHUB_STEP_SUMMARY
          echo "- **Lastmod Source**: ${SOURCE:-unknown}" >> $GITHUB_STEP_SUMMARY
        else
          echo "- **Summary Source**: sitemap_update_log.txt not found" >> $GITHUB_STEP_SUMMARY
        fi

    - name: Commit and push changes
      if: steps.verify-changed-files.outputs.changed == 'true'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add sitemap.xml
        git commit -m "🤖 Auto-update sitemap.xml"
        git push
